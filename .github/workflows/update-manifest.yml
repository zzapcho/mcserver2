name: Update Manifest

on:
  push:
    branches: [main]
    paths:
      - 'mods/**'
      - 'config/**'
      - 'resourcepacks/**'
      - 'shaderpacks/**'
  workflow_dispatch:

jobs:
  generate-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate manifest.json
        run: python3 .github/skripts/generate_manifest.py

      - name: Commit & Push manifest
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add manifest.json
          git diff --staged --quiet && echo "no change" || (
            git commit -m "chore: update manifest [skip ci]" && git push
          )
